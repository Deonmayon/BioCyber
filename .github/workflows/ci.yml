name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: biocyber
          POSTGRES_PASSWORD: biocyber
          POSTGRES_DB: biocyber
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U biocyber -d biocyber"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm run lint

      - name: Build client
        run: npm run build

      - name: Start server and check API
        env:
          NODE_ENV: production
          PORT: 5000
          DATABASE_URL: postgresql://biocyber:biocyber@localhost:5432/biocyber
        run: |
          npm run start &
          sleep 5
          curl -f http://localhost:5000/api/health
          curl -f http://localhost:5000/api/posts

services:
  db:
    image: postgres:16-alpine
    container_name: biocyber-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: biocyber
      POSTGRES_PASSWORD: biocyber
      POSTGRES_DB: biocyber
    volumes:
      - biocyber_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biocyber -d biocyber"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  biocyber_pgdata:

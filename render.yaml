databases:
  - name: biocyber-db
    plan: free
    databaseName: biocyber
    user: biocyber

services:
  - type: web
    name: biocyber
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: biocyber-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
